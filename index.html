<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Stock - Maison BABOU</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🛍️ Gestion de Stock - Maison BABOU</h1>
        </header>

        <!-- Formulaire d'ajout d'article -->
        <section class="add-article">
            <h2>Ajouter un article</h2>
            <form id="articleForm">
                <div class="form-group">
                    <label for="nom">Nom de l'article:</label>
                    <input type="text" id="nom" required>
                </div>
                
                <div class="form-group">
                    <label for="categorie">Catégorie:</label>
                    <select id="categorie" required>
                        <option value="">Sélectionnez une catégorie</option>
                        <option value="Vêtements">Vêtements</option>
                        <option value="Jouets">Jouets</option>
                        
                        <option value="Accessoires">Accessoires</option>
                        <option value="Chaussures">Chaussures</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="prix">Prix (€):</label>
                    <input type="number" id="prix" step="0.01" min="0" required>
                </div>
                
                <div class="form-group">
                    <label for="quantite">Quantité en stock:</label>
                    <input type="number" id="quantite" min="0" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Description:</label>
                    <textarea id="description" rows="3"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="image">Image de l'article:</label>
                    <input type="file" id="image" accept="image/*">
                    <div id="imagePreview"></div>
                </div>
                
                <button type="submit" class="btn-primary">Ajouter l'article</button>
            </form>
        </section>

        <!-- Barre de recherche et filtres -->
        <section class="filters">
            <input type="text" id="search" placeholder="Rechercher un article...">
            <select id="filterCategory">
                <option value="all">Toutes les catégories</option>
                <option value="Vêtements">Vêtements</option>
                <option value="Jouets">Jouets</option>
                
                <option value="Accessoires">Accessoires</option>
                <option value="Chaussures">Chaussures</option>
            </select>
        </section>

        <!-- Liste des articles -->
        <section class="inventory">
            <h2>Inventaire 📋</h2>
            <div id="articlesList" class="articles-grid"></div>
        </section>
    </div>

    <!-- Modal pour modifier un article -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Modifier l'article</h2>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="editNom">Nom:</label>
                    <input type="text" id="editNom" required>
                </div>
                <div class="form-group">
                    <label for="editCategorie">Catégorie:</label>
                    <select id="editCategorie" required>
                        <option value="Vêtements">Vêtements</option>
                        <option value="Jouets">Jouets</option>
                        
                        <option value="Accessoires">Accessoires</option>
                        <option value="Chaussures">Chaussures</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editPrix">Prix (€):</label>
                    <input type="number" id="editPrix" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="editQuantite">Quantité:</label>
                    <input type="number" id="editQuantite" min="0" required>
                </div>
                <div class="form-group">
                    <label for="editDescription">Description:</label>
                    <textarea id="editDescription" rows="3"></textarea>
                </div>
                <button type="submit" class="btn-primary">Mettre à jour</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
